<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CV Format Switcher</title>
<style>
:root {
--bg: #f3f5f8;
--panel: #ffffff;
--ink: #1f2933;
--accent: #1971c2;
--border: #d0d7de;
}
* { box-sizing: border-box; }
body {
margin: 0;
font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
background: radial-gradient(circle at 20% 20%, #dbeafe, transparent 35%),
radial-gradient(circle at 80% 10%, #e6f4ea, transparent 30%),
var(--bg);
color: var(--ink);
min-height: 100vh;
display: grid;
place-items: center;
padding: 24px;
}
.card {
width: min(680px, 100%);
background: var(--panel);
border: 1px solid var(--border);
border-radius: 16px;
box-shadow: 0 14px 32px rgba(16, 24, 40, 0.09);
padding: 36px;
}
h1 { margin: 0 0 8px; font-size: 1.8rem; }
p { margin: 0 0 24px; color: #52606d; line-height: 1.6; }
.buttons { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
display: inline-block;
text-decoration: none;
border-radius: 10px;
font-weight: 600;
padding: 10px 16px;
transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.btn-modern { background: var(--accent); color: #fff; }
.btn-classic {
border: 1px solid var(--border);
color: var(--ink);
background: #fff;
}
.btn:hover {
transform: translateY(-1px);
box-shadow: 0 8px 20px rgba(16, 24, 40, 0.12);
}
</style>
</head>
<body>
<main class="card">
<h1>Select CV Format</h1>
<p>Choose modern data-driven CV or classic CV.</p>
<div class="buttons">
<a class="btn btn-modern" href="./modern/">Open Modern CV</a>
<a class="btn btn-classic" href="/">Open Classic CV</a>
</div>
</main>
</body>
</html>
